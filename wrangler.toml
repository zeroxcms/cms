name = "cms"
main = "src/index.ts"
compatibility_date = "2026-07-14"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = "./views"
binding = "VIEWS"
run_worker_first = true

[version_metadata]
binding = "CF_VERSION_METADATA"

[[d1_databases]]
binding = "DB"
database_name = "cms"
migrations_dir = "migrations"

database_id = "ad46f5e1-943e-4386-a90f-06cc7d4fb7ec"
[[d1_databases]]
binding = "PUBLISHED_DB"
database_name = "cms-published"
migrations_dir = "migrations/published"

database_id = "e7788422-82a5-4531-8534-06d520a1bfde"
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "worker-cms-media"

# Submission ingest: pulls every published page without a draft counterpart
# into the draft DB as a submission mirror, firing submission hooks. Bounded
# batch per tick; subscribed plugins can also trigger it on demand via
# POST /__cms/ingest/submissions.
[triggers]
crons = ["*/5 * * * *"]

[[durable_objects.bindings]]
name = "PAGE_SYNC"
class_name = "PageSyncDO"

[[durable_objects.bindings]]
name = "FORM_ONCE"
class_name = "FormOnceDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PageSyncDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["FormOnceDO"]

# CMS-owned admin background jobs. Used for long plugin admin actions such as
# event duplicate/delete, and for chunked advanced-search bulk actions; job rows
# live in DB.admin_jobs. Without this binding the job runner falls back to
# running every batch synchronously in a single invocation, which blows the
# 1000-subrequest per-invocation limit on large bulk operations.
# Create the queue once before deploying: wrangler queues create cms-admin-jobs
[[queues.producers]]
binding = "ADMIN_JOBS_QUEUE"
queue = "cms-admin-jobs"

[[queues.consumers]]
queue = "cms-admin-jobs"

# One job-batch (<=100 pages) per invocation so each gets a fresh subrequest
# budget; batching several messages together would reintroduce the cap blowout.
max_batch_size = 1
max_retries = 3

# ── Rate limiting (per-colo, IP-keyed) ────────────────────────────────────────
[[unsafe.bindings]]
name = "AUTH_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "UPLOAD_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 30, period = 60 }

# ── Plugins (optional) ────────────────────────────────────────────────────────
# Register plugin Workers by HTTPS URL under Admin → Plugins. Each row receives
# a dedicated secret that must also be stored on that plugin Worker. No service
# binding or CMS redeploy is required. See examples/plugin-events.

[vars]
# PLUGINS is a deprecated service-binding-era setting and is intentionally unset.
# Comma-separated built-in publish targets: "d1" (published D1 database) and/or
# "r2" (static JSON in PUBLISH_BUCKET). Defaults to "d1" when unset. Plugin
# publish targets are discovered from plugin manifests (publishTarget: true)
# and do not need to be listed here.
# PUBLISH_TARGETS = "d1,r2"
# Comma-separated list of enabled OAuth providers: "github", "google",
# "microsoft", "apple", "eventuai". Add the matching client IDs below.
ENABLED_PROVIDERS = "github,google,microsoft"

GITHUB_CLIENT_ID = "Ov23li8mglaXOLSlA5TB"
GOOGLE_CLIENT_ID = "314543822201-np73pj9hq5biuaivquk39dhfqsffeuqb.apps.googleusercontent.com"
MICROSOFT_CLIENT_ID = "bb5e0227-7506-4db2-bdb0-8e8c4fa218e2"
# APPLE_CLIENT_ID = "<services-id>"
# EVENTUAI_CLIENT_ID = "<client-id>"
MICROSOFT_TENANT = "49b2bbef-148b-4a0f-972a-14506f047765"

# Shared redirect URI – registered with every enabled provider
OAUTH_REDIRECT_URI = "https://cms.eventuai.workers.dev/auth/callback"
CANONICAL_ORIGIN = "https://cms.eventuai.workers.dev"
SITE_TITLE = "0xCMS"

# Default timezone applied to a page's start/end window when none is set.
# UTC offset (e.g. "+0800") or an IANA name (e.g. "Asia/Hong_Kong").
DEFAULT_TIMEZONE = "+0800"
# Optional: restrict new sign-ups to these email domains (comma-separated).
# Existing users always keep access. Unset = open registration (viewer role).
# ALLOWED_EMAIL_DOMAINS = "example.com"

# Secrets – set via: wrangler secret put JWT_SECRET
# wrangler secret put EVENTUAI_CLIENT_SECRET
# wrangler secret put GITHUB_CLIENT_SECRET
# wrangler secret put GOOGLE_CLIENT_SECRET
# wrangler secret put MICROSOFT_CLIENT_SECRET
# wrangler secret put APPLE_CLIENT_SECRET
# wrangler secret put PLUGIN_SECRET   # optional outbound-only fallback for legacy plugin rows
