name = "worker-cms"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "LIVE_DB"
database_name = "cms-live"
database_id = "ebe8137c-fd98-4da5-a372-b2370f4487b0"
migrations_dir = "migrations/live"

[[d1_databases]]
binding = "DRAFT_DB"
database_name = "cms-draft"
database_id = "1e0f0732-8b15-4299-9c51-6151ccf597f1"
migrations_dir = "migrations/draft"

[[d1_databases]]
binding = "TRASH_DB"
database_name = "cms-trash"
database_id = "d9d97be0-6a28-4b78-b459-9bee90092eba"
migrations_dir = "migrations/trash"

[[d1_databases]]
binding = "AUTH_DB"
database_name = "cms-auth"
database_id = "76b3ab78-7ed6-4faa-ab5a-6263b30ec984"
migrations_dir = "migrations/auth"

[vars]
# OAuth 2.1 provider: "github" | "google" | "eventuai"
OAUTH_PROVIDER = "eventuai"
OAUTH_CLIENT_ID = "cms-eventuai"
OAUTH_REDIRECT_URI = "https://cms.eventuai.com/auth/callback"
SITE_TITLE = "Worker CMS"

# Secrets – set via: wrangler secret put JWT_SECRET
# wrangler secret put OAUTH_CLIENT_SECRET
